<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#110d20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff6a1a;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)" />

  <!-- Gradient border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- "A" letter centered, bold, gradient -->
  <text
    x="32"
    y="44"
    font-family="'Outfit', 'Segoe UI', Arial, sans-serif"
    font-size="38"
    font-weight="800"
    text-anchor="middle"
    fill="url(#textGrad)"
    letter-spacing="-2"
  >A</text>

  <!-- Small dot accent bottom right -->
  <circle cx="52" cy="52" r="4" fill="#ff6a1a" opacity="0.7" />
</svg>
